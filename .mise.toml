[tools]
python = "3.14"
ruff = "latest"
uv = "latest"

[tasks.sync]
run = "uv sync"

[tasks.venv]
run = "uv venv .venv --allow-existing --seed"

[tasks.install]
depends = ["venv"]
run = "uv pip install -e '.[dev]' --python .venv/bin/python"

[tasks.test]
depends = ["install"]
run = ".venv/bin/pyrefly check --summarize-errors && .venv/bin/pytest -vv"

[tasks.format]
depends = ["install"]
run = ".venv/bin/ruff format"

[tasks.dev]
depends = ["install"]
run = "uv run fastapi dev"
